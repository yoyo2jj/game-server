syntax="proto3";

package game;

//消息类型枚举，每种消息对应一个唯一编号
enum MsgType{
	MSG_UNKNOWN=0;
	MSG_LOGIN_REQUEST=1;
	MSG_LOGIN_RESPONSE=2;
}

//登录请求：客户端发给服务器
message LoginRequest{
	string username=1;
	string password=2;
}

//登录响应：服务器回给客户端
message LoginResponse{
	bool success=1;
	string message=2; //成功or失败的说明
}

